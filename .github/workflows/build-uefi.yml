name: Build GunyahPkg

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.build_type }}, ${{ matrix.pci_mode }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        build_type: [DEBUG, RELEASE]
        pci_mode: [CAM, ECAM]
    env:
      EDK2_TARGET: ${{ matrix.build_type }}
      PCI_CAM_MODE: ${{ matrix.pci_mode == 'CAM' && 'TRUE' || 'FALSE' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y iasl gcc uuid-dev

      - name: Build
        run: |
          chmod +x ./build.sh
          set -e
          echo "Build type: $EDK2_TARGET"
          echo "PCI mode: ${{ matrix.pci_mode }} (-DPCI_CAM_MODE=$PCI_CAM_MODE)"
          ./build.sh -DPCI_CAM_MODE="$PCI_CAM_MODE"

      - name: Prepare artifacts
        run: |
          set -e
          ART1=edk2-gunyah.fd
          ART2=edk2-gunyah.vars.fd
          if [ -f "$ART1" ]; then cp "$ART1" "edk2-gunyah-${EDK2_TARGET}-${{ matrix.pci_mode }}.fd"; fi
          if [ -f "$ART2" ]; then cp "$ART2" "edk2-gunyah-${EDK2_TARGET}-${{ matrix.pci_mode }}.vars.fd"; fi
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: edk2-gunyah-${{ matrix.build_type }}-${{ matrix.pci_mode }}
          path: |
            edk2-gunyah-${{ matrix.build_type }}-${{ matrix.pci_mode }}.fd
            edk2-gunyah-${{ matrix.build_type }}-${{ matrix.pci_mode }}.vars.fd
